version: "1.4.0"
generated_at: "2026-05-27T00:00:00Z"
source: "docs/requirements/design-requirements.md (v1.2.0) + live uranai.cloud brand scrape"
changelog:
  - "v1.4.0: 本家 uranai.cloud 実ブランドへ忠実化。① ロゴマークを実物『占＋雲』合字
    （asset.matchingcloud.com の実アイコン）へ忠実 SVG 再現（旧『三日月＋星＋雲』を破棄）。
    ② 配色を coral/navy から uranai 実配色（teal #34cccc 主 / rose ヒーロー帯 / gold ★ /
    blue リンク / red 限定アクセント / ink #212529 本文・主CTA=黒）へ全面 remap。WCAG AA を
    全テキスト/UI 組合せで再検算し、明色は濃色派生（teal-strong #0d7373 / gold-text #8f6c00 /
    blue #0c75b0 / red-text #cc2233）で担保。③ アバターを DiceBear から本家実写写真
    （public/avatars/real-*.png, asset.matchingcloud.com/user/*）へ差替・@dicebear 撤去。
    ④ ヒーローを黄道十二宮の星座モチーフ＋ローズグラデへ、ブログカバーを天体テーマ
    （ink 夜空 + teal 星座線 + gold 星/月）へ。⑤ スプラッシュを総尺 ~3.0–3.6s へ延伸
    （ロゴ burst→呼吸の間→タグライン→ゆったりワイプ）。構造/モーション基盤は不変。"
  - "v1.3.0: ブランドアイデンティティ強化。ロゴマーク、フルスクリーン・オープニング
    スプラッシュ（once/session・skippable・reduced-motion 非表示）、ローカルアバター、
    占術テーマのブログカバー、ヒーローの大ロゴ＋グロー、統計カウントアップを追加。"
  - "v1.2.0: brighty 由来の動的デザイン（モーション）強化。animation_rules を
    入場≤700ms / マイクロ≤200ms の二層へ改訂、ease-snap easing と LIVE ティッカー/
    pulse-dot/ロード時カスケード等のシグネチャモーションを追加（components.animation 節参照）。"
project: "uranai-cloud-renewal"
reference_site: "uranai.cloud (live brand) + brighty.site (layout/motion quality)"
note: >
  配色・ロゴ・写真は本家 uranai.cloud の実ブランド（matchingcloud 上の実 CSS/資産）を解析した
  確定値に準拠（teal #34cccc 主色 / rose ヒーロー帯 / gold ★ / blue リンク / ink ロゴ・本文・
  主CTA=黒）。レイアウト/余白/モーション品質は brighty 水準を踏襲。shadcn/ui のベースは
  ニュートラルグレースケール、uranai ブランド色はアクセントとして適用。WCAG AA は自前の相対輝度
  計算（/tmp/uranai-rebrand/wcag*.mjs）で全組合せ検証済。明色（teal/gold/red）はテキスト/小UIで
  濃色派生 or 黒を使用（white-on-teal は塗り＋大文字/UI のみ）。

aesthetic:
  direction: celestial-refined
  mood: clean-trustworthy
  differentiation: >
    白〜オフホワイト基調のミニマルUIに ink（#212529 = 本家ロゴ/本文/主CTA の黒）をベース、
    teal（#34cccc = 本家主色）を主アクセント、ヒーローは rose グラデ＋黄道十二宮の星座モチーフ、
    ★評価は gold。紫グラデ・過剰装飾を排し、本家 uranai.cloud のブランドを継承しつつ brighty
    水準の洗練さで「温かく信頼できる相談相手を見つける場所」を表現する。

# ---------------------------------------------------------------------------
# Colors — 本家 uranai.cloud 実配色 + WCAG AA 担保のための濃色派生
# 各値の WCAG コントラストは comment に記載（自前 WCAG2.1 相対輝度計算）
# WCAG AA 検算サマリ（on #ffffff）:
#   ink #212529 15.43 (AAA) / teal-strong #0d7373 5.65 (AA text) / blue #0c75b0 5.02 /
#   gold-text #8f6c00 4.87 / red-text #cc2233 5.46 / gray-500 #6b7280 4.83
#   teal #34cccc 1.97・gold #efbf2f 1.73・red #f34f5f 3.45 → 塗り/大UI/装飾のみ（テキスト不可）
#   white on ink 15.43 / white on teal-strong 5.65 / white on blue 5.02 / white on red-text 5.46
#   on ink(footer): white 15.43 / gray-300 10.47 / gray-400 6.08 / teal 7.83 / gold 8.94
# ---------------------------------------------------------------------------
colors:
  # --- shadcn ベース（ニュートラル） ---
  primary: "#212529"          # base primary = brand-ink。on #fff 15.43:1 (AAA)。主CTA塗り=黒（本家踏襲）
  secondary: "#f3f4f6"        # gray-100
  muted: "#f3f4f6"            # gray-100。セクション区切り/タグ背景
  accent: "#34cccc"           # ブランドアクセント = teal（塗り/装飾。on #fff 1.97 = テキスト不可）

  background:
    light: "#fafafa"          # gray-50。ink 文字 14.78:1
    dark: "#212529"           # brand-ink。white 文字 15.43:1
  surface:
    light: "#ffffff"
    dark: "#2a2e33"           # ink 派生のダーク面。white 文字 ~13:1 / teal-light 装飾
  text:
    primary: "#212529"        # on #fafafa 14.78:1 (AAA)
    secondary: "#6b7280"      # gray-500。on #fff 4.83:1 (AA PASS) / on rose-pale 4.42 (= 旧 orange-pale 4.41 同等)
    faint: "#9ca3af"          # gray-400。placeholder のみ（非情報）
    on_dark: "#ffffff"        # on ink 15.43:1
    on_dark_secondary: "#d1d5db"  # gray-300 on ink 10.47:1 (AAA)
    on_dark_muted: "#9ca3af"      # gray-400 on ink 6.08:1 (AA)
  border:
    decorative: "#e8e9ed"     # gray-200。装飾枠（情報伝達不可）
    functional: "#9ca3af"     # gray-400。UI境界/入力枠。focus ring は teal-strong 併用

  # --- ブランドカラー（本家 uranai.cloud 実配色 + AA 濃色派生） ---
  brand:
    ink: "#212529"            # ロゴ/本文/見出し/フッター/主CTA塗り（黒）。on #fff 15.43 (AAA)
    teal: "#34cccc"           # 主アクセント塗り/装飾（本家最頻色）。on #fff 1.97 → テキスト不可・塗りのみ
    teal_strong: "#0d7373"    # リンク/アイコン/AAテキスト/focus ring。on #fff 5.65:1 (AA text) ★テキスト用
    teal_light: "#5fd6d6"     # ホバー/装飾/ダーク面アクセント（塗りのみ。on ink 高コントラスト）
    teal_pale: "#e6f7f7"      # teal 淡い背景（アイコンディスク等）。ink 文字 13.97 (AAA)
    rose_pale: "#fdf2f4"      # ヒーロー帯/淡い背景（本家ヒーローのローズピンク）。ink 文字 13.71 (AAA)
    rose_mid: "#f8d7da"       # ヒーロー帯グラデ stop
    gold: "#efbf2f"           # ★評価/装飾の塗り（本家ゴールド）。on #fff 1.73 → テキスト不可・塗りのみ
    gold_text: "#8f6c00"      # gold のテキスト用 AA 派生。on #fff 4.87:1 (AA text)
    blue: "#0c75b0"           # リンク（本家 #0e83c5 を AA 派生）。on #fff 5.02:1 (AA text)
    red: "#f34f5f"            # 限定アクセント塗り（本家レッド）。on #fff 3.45 → 大UI/装飾のみ
    red_text: "#cc2233"       # red のテキスト用 AA 派生。on #fff 5.46:1 (AA text)

  # --- 状態色（テキスト用は AA 担保の濃色派生を使用。ブランド色とは独立した意味色） ---
  state:
    success: "#5ba97b"        # 成功/受付中の装飾塗り（緑＝慣習的な状態色。ブランド色ではない）
    success_fg: "#27704d"     # 成功テキスト/アイコン。on #fff 5.98:1 (AA PASS)
    warning_fg: "#946018"     # 警告テキスト。on #fff 5.32:1 (AA PASS)
    danger: "#c0392b"         # 辞退/エラー。on #fff 5.44:1 (AA PASS)
    info: "#212529"           # 情報は ink

  # --- ダークモード（ink 面）の CTA ---
  dark_mode:
    cta_fill: "#34cccc"       # teal on ink 7.83:1（塗り。ink 文字との組合せ可）
    cta_text_on_ink: "#5fd6d6"  # teal-light on ink（テキスト可・高コントラスト）

# ---------------------------------------------------------------------------
# Typography — brighty.site 実測（Outfit / DM Sans / Noto Sans JP）
# 禁止: Inter / Roboto / Arial
# ---------------------------------------------------------------------------
typography:
  heading:
    family: "Outfit"
    fallback: "system-ui, sans-serif"
    locale_jp: "Noto Sans JP"
    weights: [600, 700, 800]
  body:
    family: "DM Sans"
    fallback: "system-ui, sans-serif"
    locale_jp: "Noto Sans JP"
    weights: [400, 500, 600]
  japanese:
    family: "Noto Sans JP"
    fallback: '"Hiragino Sans", sans-serif'
    weights: [300, 400, 500, 600, 700, 800]
  numeric:
    feature: "tabular-nums"
  letter_spacing:
    display: "-0.02em"   # Outfit の大見出しは僅かに詰める（brighty 風の締まり）
    heading: "-0.01em"
    body: "0"
    jp: "0.02em"         # 日本語本文は僅かに広げ可読性確保
  optional_mincho_accent:
    family: "Shippori Mincho"
    usage: "限定的アクセント（ブログ記事タイトル装飾等）。MVP既定は Noto Sans JP"
  scale:
    display: { size: "3rem",     line_height: "1.1"  }   # 48px hero h1
    h1:      { size: "2.25rem",  line_height: "1.15" }   # 36px
    h2:      { size: "1.75rem",  line_height: "1.2"  }   # 28px
    h3:      { size: "1.375rem", line_height: "1.3"  }   # 22px
    h4:      { size: "1.125rem", line_height: "1.4"  }   # 18px
    body_lg: { size: "1.125rem", line_height: "1.7"  }   # 18px
    body:    { size: "1rem",     line_height: "1.7"  }   # 16px
    sm:      { size: "0.875rem", line_height: "1.5"  }   # 14px
    xs:      { size: "0.75rem",  line_height: "1.4"  }   # 12px

# ---------------------------------------------------------------------------
# Spacing — 8px グリッド
# ---------------------------------------------------------------------------
spacing:
  unit: "8px"
  scale:
    xs: "4px"
    sm: "8px"
    md: "16px"
    lg: "24px"
    xl: "32px"
    "2xl": "48px"
    "3xl": "64px"
    "4xl": "96px"
  section_gap:
    mobile: "48px"
    desktop: "96px"

# ---------------------------------------------------------------------------
# Borders — brighty 実測角丸 (xs2 / base10 / 12 / 2xl16 / 3xl24)
# ---------------------------------------------------------------------------
borders:
  radius:
    none: "0"
    xs: "2px"
    base: "0.625rem"   # 10px (brighty base)
    md: "12px"
    "2xl": "16px"
    "3xl": "24px"
    full: "9999px"
  width:
    thin: "1px"
    medium: "2px"
    thick: "4px"

# ---------------------------------------------------------------------------
# Shadows — 控えめ4段（過剰シャドウ禁止）
# ---------------------------------------------------------------------------
shadows:
  sm: "0 1px 2px rgba(34, 34, 51, 0.05)"
  base: "0 1px 3px rgba(34, 34, 51, 0.08), 0 1px 2px rgba(34, 34, 51, 0.04)"
  md: "0 4px 6px rgba(34, 34, 51, 0.08)"
  lg: "0 10px 20px rgba(34, 34, 51, 0.08)"

# ---------------------------------------------------------------------------
# Blur — brighty 実測 (sm8 / md12 / xl24 / 2xl40 / 3xl64)
# ---------------------------------------------------------------------------
blur:
  sm: "8px"
  md: "12px"
  xl: "24px"
  "2xl": "40px"
  "3xl": "64px"

# ---------------------------------------------------------------------------
# Components — 技術前提
# ---------------------------------------------------------------------------
components:
  library: "shadcn-ui"
  styling: "tailwind"
  animation: "motion/react"
  icons: "lucide-react"
  utility: "cn"
  animation_rules:
    # v1.2.0: two-tier durations (brighty-aligned, intentional revision).
    # Rationale: brighty.site の入場演出は CSS keyframe 駆動で ~0.4–0.65s。旧来の
    # 単一 200ms 縛りでは「開いた瞬間にパッと出る」カスケードや LIVE ティッカー/
    # pulse など brighty 由来の動的シグネチャを表現できないため、入場演出と
    # マイクロ操作を分離する。compositor props (transform/opacity) のみは不変。
    entrance_max_duration_ms: 700   # ロード時カスケード / スクロールリビール / ロゴ pop-in
    micro_max_duration_ms: 200      # hover / press / 色変化などのマイクロ操作
    easing: "cubic-bezier(0.22, 1, 0.36, 1)"  # ease-snap (brighty snap-decelerate)
    signature_loops:                # 継続アニメ（reduced-motion で停止）
      pulse_dot_ms: 2000            # LIVE / 受付中 の緑ドット
      ticker_scroll_ms: 100000      # 実績マーキー（100s linear infinite）
    allowed_props: ["transform", "opacity"]
    respect_reduced_motion: true    # prefers-reduced-motion: reduce で全演出を即時最終状態に

# ---------------------------------------------------------------------------
# Layout — コンテナ最大幅 (brighty 実測)
# ---------------------------------------------------------------------------
layout:
  container_max: "80rem"      # 1280px 基調
  container_wide: "96rem"     # 1536px ワイド
  content_max: "42rem"        # ブログ本文 (65-75字)
  z_index:
    base: 0
    dropdown: 1000
    sticky: 1100
    overlay: 1200
    modal: 1300
    toast: 1400

# ---------------------------------------------------------------------------
# Responsive — brighty 実測 BP (sm640 md768 lg1024 xl1280 2xl1536)
# ---------------------------------------------------------------------------
responsive:
  mobile_first: true
  breakpoints:
    sm: "640px"
    md: "768px"
    lg: "1024px"
    xl: "1280px"
    "2xl": "1536px"
  grid_columns:
    base: 1
    sm: 2
    lg: 3
    xl: 4

# ---------------------------------------------------------------------------
# Quality — 品質ゲート基準
# ---------------------------------------------------------------------------
quality:
  lighthouse:
    performance: 90
    accessibility: 100
    best_practices: 100
    seo: 100
  wcag_level: "AA"
  contrast:
    body_text: "4.5:1"
    large_text: "3:1"
    ui_components: "3:1"
  dark_mode: true
  reduced_motion: true

# ---------------------------------------------------------------------------
# Anti-patterns — 禁止事項
# ---------------------------------------------------------------------------
anti_patterns:
  fonts: ["Inter", "Roboto", "Arial"]
  colors: ["purple-gradient-on-white"]
  effects: ["excessive-drop-shadow", "glow"]
  layout: ["predictable-template"]
  contrast: ["white-text-on-brand-teal", "white-text-on-brand-gold", "white-small-text-on-brand-red", "gold/teal-as-small-text"]
  # NOTE: effects.glow は「過剰グローの濫用」を禁ずる規定。導入済みの
  # ブランドグロー（teal）は brand_identity.glow_policy のとおり「ロゴマーク周辺
  # に限定」した抑制的な演出であり、本規定の範囲外（濫用しない・装飾のみ・
  # コントラストへ影響しない）。明色（teal/gold/red）は塗り/大UI/装飾のみで使い、
  # テキストは濃色派生（teal-strong/gold-text/red-text）or ink を使用する。

# ---------------------------------------------------------------------------
# Brand identity — ロゴ / スプラッシュ / イメージ (v1.4.0: 本家 uranai.cloud 忠実化)
# ---------------------------------------------------------------------------
brand_identity:
  logo_mark:
    component: "src/components/brand/logo-mark.tsx"   # インライン SVG（recolor/animate 可・currentColor）
    favicon: "src/app/icon.svg"                       # ink 角丸バッジ + 白マーク（本家ロゴタイプ左の見え方）
    og_image: "src/app/opengraph-image.tsx"           # next/og 動的生成（ink 背景 + teal マーク + ロゴタイプ）
    real_assets:
      logotype: "public/brand/uranai-logo.png (本家 352x94 ロゴタイプ)"
      icon: "public/brand/uranai-icon.png (本家 512² 線画アイコン)"
      favicon: "public/brand/uranai-favicon.png (本家 favicon)"
    motif: ["占 漢字の 卜（縦棒＋右上フラッグ）", "占 の 口 を 雲(クラウド)に置換した合字"]
    note: "本家 uranai.cloud の実アイコンを単一ウェイト線画で忠実 SVG 再現（旧『三日月＋星＋雲』を破棄）。"
    colors: { ink: "#212529", teal: "#34cccc (glow)" }  # 既定は currentColor 継承
    usage:
      - "サイトヘッダーのロゴ（ink 角丸バッジ + 白マーク + 『占いクラウド』, animate-pop-in 維持）"
      - "フッターのブランドバッジ（白マーク on white/10 ディスク）"
      - "ヒーローのブランドビジュアル（celestial-motif 内・大サイズ＋teal グロー＋浮遊）"
      - "スプラッシュ中央（バースト表示）/ favicon / OG"
    a11y: "装飾時は aria-hidden、意味付与時は role=img + <title>。隣接テキスト『占いクラウド』で名称担保。"

  glow_policy:
    description: "teal グローはブランド演出としてロゴマーク周辺に限定。背景全面・本文・UI には適用しない。"
    scope: ["logo-mark (hero/celestial)", "splash logo", "splash radial backdrop"]
    technique: "SVG <filter> (feGaussianBlur+feFlood teal) / Tailwind blur on bg-brand-teal/低不透明度"

  splash_intro:
    component: "src/components/brand/splash-intro.tsx"   # Client Component
    mounted_in: "src/app/layout.tsx (<body> 直下)"
    behavior:
      client_only: "useEffect で didMount 後のみ描画。SSR 出力に含めない＝下層ページ/SEO 不変。"
      once_per_session: "sessionStorage キー `uranai_splash_seen`。ページ遷移/再訪では再生しない。"
      skippable: "click / Esc / scroll(wheel/touchmove) で即 dismiss。~3.0s で自動 dismiss（延伸）。"
      reduced_motion: "prefers-reduced-motion: reduce のときは表示せず即ページ（マウントしない）。"
      cls_safe: "fixed・transform/opacity/clip-path のみ。dismiss 後 DOM から unmount。LCP/CLS 非悪化。"
    timing:  # v1.4.0 延伸（余白を持ってゆっくり）。総尺 ≈ AUTO_DISMISS(3000) + WIPE(800) ≈ 3.8s
      phase1_logo_burst: "0.95s（ゆっくり開く scale 0.62→1）+ glow 拡大 1.1s"
      phase2_hold_breathe: "glow が splash-breathe(2.2s, delay 1.1s) でゆっくり脈動＝呼吸の間"
      phase3_tagline: "0.9s, delay 1.5s（ロゴ＋ホールドの後にゆったり出現）"
      phase4_wipe: "0.8s clip-path 上方向ワイプ（WIPE_MS=800 と一致）"
      sparks: "0.85s, delay 520–760ms（後ろ倒し＝ロゴが開ききってから散る）"
    motion: "ロゴ burst（ゆっくり）→ 呼吸の間（glow 脈動）→ タグライン → ゆったりワイプ。compositor props のみ。"
    keyframes: ["splash-logo-burst", "splash-glow-expand", "splash-breathe", "splash-tagline", "splash-spark", "splash-wipe"]
    tagline: "あなたに合う占い師を。"

  imagery:
    avatars:
      source: "本家 uranai.cloud 実写写真（asset.matchingcloud.com/user/*.png）"
      local_demo: "public/avatars/real-01.png … real-21.png（代表21件をローカル取得・デモ用）"
      assignment: "16 名へ real-01..real-16 を index 順で決定論的に割当（冪等・再 seed 安全）"
      data: "prisma/seed.ts で FortuneTellerProfile.photoUrl=/avatars/real-XX.png（queries: photoUrl ?? user.avatarUrl）"
      migration: "W4 データ移行時は asset.matchingcloud.com/user/* の実 URL をそのまま使用可（next.config remotePatterns 許可）"
      removed: "DiceBear（@dicebear/* devDependency・scripts/gen-avatars.ts・public/avatars/advisor-*.svg）を撤去"
    celestial_motif:
      component: "src/components/brand/celestial-motif.tsx"
      theme: "ローズグラデ（rose-pale→white→teal-pale）+ 黄道十二宮の星座リング（gold/teal 星 + teal 星座線）+ 中央『占＋雲』マーク"
      restraint: "星はまばら・線は細く低不透明度。brighty の余白感を維持（過剰禁止）。"
    blog_covers:
      output: ["public/blog/cover-tarot.svg", "cover-star.svg", "cover-crystal.svg", "cover-moon.svg", "cover-palm.svg"]
      theme: "天体テーマ（ink 夜空 + teal 星座線/モチーフ + gold 星/月 + rose-pale アクセント）。紫グラデ禁止に準拠。"
      data: "prisma/seed.ts で BlogPost.thumbnailUrl を記事モチーフ別に割当"
    delivery: "アバターは実写 PNG（ローカル demo / 移行時 remotePatterns）。ブログカバーはローカル SVG（same-origin・<img>）。"

  stat_count_up:
    component: "src/components/home/count-up.tsx (Client)"
    used_in: "src/components/home/stat-band.tsx"
    behavior: "in-view で 0→実値カウントアップ。tabular-nums で桁ブレなし。整数/小数(1桁)/★表記対応。"
    reduced_motion: "アニメーションせず即値。SSR/no-JS でも初期 state=実値で空白にならない。"
