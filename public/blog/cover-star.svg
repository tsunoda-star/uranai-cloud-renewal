    <path d="M420 160 l6 12 13 1 -9 9 2 13 -12 -7 -12 7 2 -13 -9 -9 13 -1Z"/>
    <path d="M520 240 l6 12 13 1 -9 9 2 13 -12 -7 -12 7 2 -13 -9 -9 13 -1Z"/>
    <path d="M470 330 l6 12 13 1 -9 9 2 13 -12 -7 -12 7 2 -13 -9 -9 13 -1Z"/>
    <path d="M360 300 l6 12 13 1 -9 9 2 13 -12 -7 -12 7 2 -13 -9 -9 13 -1Z"/>
  </g>
  <!-- crescent moon (gold) -->
